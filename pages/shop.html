<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop – New Leash of Life</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header id="site-header"></header>
    <nav id="site-nav"></nav>

    <main class="container shop-page">

        <h1 class="page-title">Shop Our Products</h1>

        <!-- Search + Filters -->
        <section class="shop-controls">
            <input type="text" id="search" class="search-bar" placeholder="Search for toys, treats, accessories...">

            <select id="category-filter" class="filter-dropdown">
                <option value="all">All Categories</option>
            </select>

            <select id="sort-filter" class="filter-dropdown">
                <option value="default">Sort By</option>
                <option value="price-asc">Price: Low → High</option>
                <option value="price-desc">Price: High → Low</option>
                <option value="name-asc">Name: A → Z</option>
                <option value="name-desc">Name: Z → A</option>
            </select>
        </section>

        <!-- Product Grid -->
        <section id="product-grid" class="product-grid">
            <!-- Dynamic product cards will be injected here -->
        </section>

    </main>

    <footer id="site-footer"></footer>

    <script src="../js/products.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
